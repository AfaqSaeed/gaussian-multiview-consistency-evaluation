    <text x="145" y="38" fill="#cbd5e1" font-family="Arial" font-size="22">Does every view preserve the same object identity, prompt attributes, geometry, and relations?</text>
    <text x="30" y="72" fill="#94a3b8" font-family="Arial" font-size="18">Status: scaffold now, results to be filled after baseline and ablation experiments.</text>
