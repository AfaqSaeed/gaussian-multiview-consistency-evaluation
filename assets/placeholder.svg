<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#0f172a"/>
  <text x="70" y="90" fill="#f8fafc" font-family="Arial, sans-serif" font-size="38" font-weight="700">Prompt-Grounded Multi-View Consistency</text>
  <text x="70" y="140" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="22">Evaluating generated 3D Gaussians beyond FID/KID/COV/MMD</text>
  <g transform="translate(90 230)">
    <rect x="0" y="0" width="180" height="140" rx="18" fill="#1e293b" stroke="#38bdf8" stroke-width="3"/>
    <text x="40" y="75" fill="#e0f2fe" font-family="Arial" font-size="20">Front</text>
    <rect x="230" y="0" width="180" height="140" rx="18" fill="#1e293b" stroke="#38bdf8" stroke-width="3"/>
    <text x="275" y="75" fill="#e0f2fe" font-family="Arial" font-size="20">Side</text>
    <rect x="460" y="0" width="180" height="140" rx="18" fill="#1e293b" stroke="#f97316" stroke-width="3"/>
    <text x="500" y="75" fill="#ffedd5" font-family="Arial" font-size="20">Back?</text>
    <rect x="690" y="0" width="180" height="140" rx="18" fill="#1e293b" stroke="#38bdf8" stroke-width="3"/>
    <text x="725" y="75" fill="#e0f2fe" font-family="Arial" font-size="20">Other</text>
  </g>
  <g transform="translate(90 465)">
